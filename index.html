  //Question number 26 "create a calculation function that takes (num1,num2, operator)" and performs +,-,*,/
          
           function calculate(num1,num2,operator)
           {
            if(operator === "+") {
              return num1+ num2;
                }
                else if(operator === "-" ){
                  return num1 - num2;
              }
               else if (operator ==="*"){
                return num1 * num2;
               }
               else if (operator ==="/"){
                return num1 / num2;
              }
              else {
                return "Invalid Operator";

              }
           }
           console.log(calculate(10 ,5 ,"+"));
           console.log (calculate (10 ,5 ,"-"));
            console.log (calculate (10 ,5 ,"*"));
